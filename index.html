<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My House | Indicações entre Vizinhos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #F4F7FC;
            color: #1a2a3a;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* CABEÇALHO - RESPONSIVO */
        .header-minimal {
            padding: 20px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 2px solid #1E3A5F;
            margin-bottom: 24px;
        }

        @media (min-width: 600px) {
            .header-minimal {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            body {
                padding: 0 20px 60px;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .logo-icon {
            background-color: #1E3A5F;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1E3A5F;
        }

        .logo-text span {
            color: #F97316;
        }

        .new-post-btn {
            background-color: #1E3A5F;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
        }

        @media (min-width: 600px) {
            .new-post-btn {
                width: auto;
            }
        }

        /* MODAL - RESPONSIVO */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            position: relative;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #F97316;
            padding-left: 12px;
            color: #1E3A5F;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #8f9fb0;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #1E3A5F;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            border: 1.5px solid #cbd5e1;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.9rem;
            background: #fff;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #F97316;
            outline: none;
        }

        .inline-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 450px) {
            .inline-row {
                flex-direction: row;
            }
            .inline-row .form-group {
                flex: 1;
            }
        }

        .btn-submit-modal {
            background: #F97316;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
        }

        /* CATEGORIAS - RESPONSIVO */
        .categorias-wrapper {
            margin-bottom: 24px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .categorias-container {
            display: inline-flex;
            gap: 8px;
            padding-bottom: 4px;
        }

        .categoria-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1E3A5F;
            cursor: pointer;
            white-space: nowrap;
        }

        .categoria-btn.active {
            background: #1E3A5F;
            border-color: #1E3A5F;
            color: white;
        }

        .add-cat-btn {
            background: #f1f5f9;
            border: 1px dashed #F97316;
            border-radius: 32px;
            padding: 8px 16px;
            font-size: 0.75rem;
            color: #F97316;
            cursor: pointer;
            white-space: nowrap;
        }

        /* CARDS - RESPONSIVOS */
        .profissionais-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .card-header {
            padding: 16px;
        }

        .prof-title {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 8px;
        }

        .prof-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1E3A5F;
            word-break: break-word;
        }

        .categoria-tag {
            font-size: 0.65rem;
            background: #EFF6FF;
            padding: 4px 10px;
            border-radius: 30px;
            color: #1E3A5F;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .star {
            color: #cbd5e1;
            font-size: 1rem;
        }

        .star.filled {
            color: #F97316;
        }

        .rating-value {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-left: 4px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 10px;
        }

        .contact-info span {
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .photos-area {
            padding: 12px 16px;
            background: #fefefe;
            border-top: 1px solid #eef2f8;
            border-bottom: 1px solid #eef2f8;
        }

        .photos-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #F97316;
            margin-bottom: 6px;
        }

        .photos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .photo-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            color: #1E3A5F;
        }

        .reviews-area {
            padding: 14px 16px;
        }

        .review-item {
            background: #F8FAFE;
            border-left: 3px solid #F97316;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 10px;
        }

        .review-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 0.65rem;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 6px;
            gap: 8px;
        }

        .review-text {
            font-size: 0.8rem;
            color: #2d3e50;
            line-height: 1.4;
        }

        .btn-add-review {
            background: none;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            color: #F97316;
            width: 100%;
        }

        @media (min-width: 450px) {
            .btn-add-review {
                width: auto;
            }
        }

        .inline-review-form {
            margin-top: 14px;
            background: #f9fafc;
            border-radius: 18px;
            padding: 12px;
            display: none;
        }

        .inline-review-form.show {
            display: block;
        }

        .review-input-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        @media (min-width: 450px) {
            .review-input-row {
                flex-direction: row;
            }
            .review-input-row input {
                flex: 1;
            }
        }

        .review-input-row input, .review-form-text {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.75rem;
        }

        .review-form-text {
            border-radius: 16px;
            margin: 8px 0;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #8ba0b5;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #F97316;
        }

        /* STAR RATING INPUT */
        .star-rating-input {
            display: flex;
            gap: 4px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .star-rating-input .star-input {
            transition: color 0.2s;
        }

        .star-rating-input .star-input:hover,
        .star-rating-input .star-input.hover {
            color: #fca5a5; /* a lighter orange for hover */
        }

        .star-rating-input .star-input.filled {
            color: #F97316;
        }

        /* MEDIA UPLOAD */
        .media-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }
        .media-upload-area:hover {
            border-color: #F97316;
            background-color: #fff7ed;
        }
        .media-upload-area input[type="file"] {
            display: none;
        }
        .media-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .media-preview-item {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        .media-preview-item img, .media-preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .media-remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-minimal">
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">My <span>House</span></div>
        </div>
        <button class="new-post-btn" id="openModalBtn">+ Nova indicação</button>
    </div>

    <div class="categorias-wrapper">
        <div class="categorias-container" id="categoriasContainer"></div>
    </div>

    <div id="listaProfissionais" class="profissionais-grid">
        <div class="loading">🔄 Carregando indicações...</div>
    </div>

    <footer>My House • indicações entre vizinhos • dados salvos na nuvem</footer>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3>Nova indicação</h3>
        <div class="form-group">
            <label>Profissional / Empresa</label>
            <input type="text" id="modalNome" placeholder="Ex: Gran Design">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select id="modalCategoria"></select>
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="modalTelefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
            <label>Endereço (opcional)</label>
            <input type="text" id="modalEndereco" placeholder="Rua, número...">
        </div>
        <div class="inline-row">
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" id="modalIndicador" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Seu AP</label>
                <input type="text" id="modalAp" placeholder="Bloco, nº">
            </div>
        </div>
        <div class="form-group">
            <label>Sua nota *</label>
            <div id="modalStarRating" class="star-rating-input" data-rating="0">
                <!-- Stars will be generated by JS -->
            </div>
        </div>
        <div class="form-group">
            <label>Sua avaliação * (mín. 20 caracteres)</label>
            <textarea rows="3" id="modalAvaliacao" placeholder="Conte sua experiência..."></textarea>
        </div>
        <div class="form-group">
            <label>Fotos e Vídeos (opcional)</label>
            <div id="modalMediaUpload" class="media-upload-area">
                <span>Clique para adicionar fotos ou vídeos</span>
                <input type="file" id="modalFileInput" multiple accept="image/*,video/*">
            </div>
            <div id="modalMediaPreviews" class="media-previews"></div>
        </div>
        <button class="btn-submit-modal" id="submitProfissional">Cadastrar profissional</button>
    </div>
</div>

<script>
    (function() {
        // ============================================
        // 🔧 CONFIGURE AQUI - SUBSTITUA PELOS SEUS DADOS
        // ============================================
        const SUPABASE_URL = "https://kjbbthydceoqqppxhpwb.supabase.co/";
        const SUPABASE_ANON_KEY = "sb_publishable_ln29EqiHlLAnoFzQwGFPmQ_UfDK4-Wq";
        // ============================================
        
        const MAX_IMAGE_SIZE_MB = 5;
        const MAX_VIDEO_SIZE_MB = 10;
        const MIN_REVIEW_LENGTH = 20;

        // State for file uploads
        let modalFiles = [];
        let reviewFiles = new Map(); // Map<professionalId, File[]>

        let supabaseClient = null;
        
        // Inicializa Supabase
        function initSupabase() {
            if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                console.log("Supabase inicializado com sucesso!");
                return true;
            } else {
                console.log("Aguardando carregamento do Supabase...");
                return false;
            }
        }

        // Carrega o script do Supabase se necessário
        if (typeof window.supabase === 'undefined') {
            const script = document.createElement('script');
            script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            script.onload = () => {
                if (initSupabase()) {
                    carregarTudo();
                }
            };
            script.onerror = () => {
                console.error("Erro ao carregar Supabase");
                document.getElementById('listaProfissionais').innerHTML = '<div class="loading">❌ Erro ao carregar. Verifique sua conexão.</div>';
            };
            document.head.appendChild(script);
        } else {
            if (initSupabase()) {
                carregarTudo();
            }
        }

        let categoriaAtiva = "todos";
        let categoriasSet = new Set(["moveis", "eletricistas", "ar-condicionado", "marmores", "obras", "gesso", "outros"]);
        const categoriaDisplay = {
            moveis: "Móveis",
            eletricistas: "Eletricistas",
            "ar-condicionado": "Ar Condicionado",
            marmores: "Mármores/Granitos",
            obras: "Obras/Reformas",
            gesso: "Gesso",
            outros: "Outros"
        };

        // ❗ IMPORTANTE: Crie um bucket público no Supabase Storage chamado 'my-house-media' para que os uploads funcionem.
        async function uploadMedia(files, professionalId) {
            if (!files || files.length === 0) return [];

            const uploadedUrls = [];
            for (const file of files) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                const filePath = `${professionalId}/${fileName}`;

                const { error } = await supabaseClient.storage
                    .from('my-house-media') // Assumes a public bucket named 'my-house-media'
                    .upload(filePath, file);

                if (error) {
                    console.error('Erro no upload:', error);
                    alert(`Falha ao enviar o arquivo ${file.name}.`);
                    // Continue to next file or stop? For now, continue.
                } else {
                    const { data } = supabaseClient.storage
                        .from('my-house-media')
                        .getPublicUrl(filePath);
                    
                    if (data && data.publicUrl) {
                        uploadedUrls.push(data.publicUrl);
                    }
                }
            }
            return uploadedUrls;
        }

        function createStarRating(container) {
            if (!container) return;
            container.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('span');
                star.className = 'star-input';
                star.textContent = '★';
                star.dataset.value = i;
                container.appendChild(star);
            }

            const stars = container.querySelectorAll('.star-input');
            
            container.addEventListener('mouseover', e => {
                if (e.target.classList.contains('star-input')) {
                    const hoverValue = parseInt(e.target.dataset.value);
                    stars.forEach(s => {
                        s.classList.toggle('hover', parseInt(s.dataset.value) <= hoverValue);
                    });
                }
            });

            container.addEventListener('mouseout', () => {
                stars.forEach(s => s.classList.remove('hover'));
            });

            container.addEventListener('click', e => {
                if (e.target.classList.contains('star-input')) {
                    const clickValue = parseInt(e.target.dataset.value);
                    container.dataset.rating = clickValue;
                    stars.forEach(s => {
                        s.classList.toggle('filled', parseInt(s.dataset.value) <= clickValue);
                    });
                }
            });
        }

        function handleFileSelect(input, previewsContainer, fileList) {
            previewsContainer.innerHTML = ''; // Clear previous previews
            fileList.length = 0; // Clear the file array

            const files = Array.from(input.files);

            for (const file of files) {
                const isImage = file.type.startsWith('image/');
                const isVideo = file.type.startsWith('video/');
                
                if (!isImage && !isVideo) continue;

                if (isImage && file.size > MAX_IMAGE_SIZE_MB * 1024 * 1024) {
                    alert(`A imagem ${file.name} excede o limite de ${MAX_IMAGE_SIZE_MB}MB.`);
                    continue;
                }

                if (isVideo && file.size > MAX_VIDEO_SIZE_MB * 1024 * 1024) {
                    alert(`O vídeo ${file.name} excede o limite de ${MAX_VIDEO_SIZE_MB}MB.`);
                    continue;
                }

                fileList.push(file);

                const previewItem = document.createElement('div');
                previewItem.className = 'media-preview-item';

                const fileUrl = URL.createObjectURL(file);
                const mediaElement = isImage ? document.createElement('img') : document.createElement('video');
                mediaElement.src = fileUrl;
                if (!isImage) mediaElement.muted = true;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'media-remove-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = () => {
                    previewItem.remove();
                    const index = fileList.indexOf(file);
                    if (index > -1) fileList.splice(index, 1);
                    URL.revokeObjectURL(fileUrl);
                };

                previewItem.appendChild(mediaElement);
                previewItem.appendChild(removeBtn);
                previewsContainer.appendChild(previewItem);
            }
        }

        async function carregarProfissionais() {
            if (!supabaseClient) return [];
            try {
                const { data: profs, error } = await supabaseClient
                    .from('profissionais')
                    .select('*')
                    .order('created_at', { ascending: false });
                    
                if (error) {
                    console.error("Erro ao carregar profissionais:", error);
                    return [];
                }
                
                for (let p of profs || []) {
                    const { data: avals } = await supabaseClient
                        .from('avaliacoes')
                        .select('*')
                        .eq('profissional_id', p.id)
                        .order('created_at', { ascending: false });
                    p.avaliacoes = avals || [];
                    if (p.categoria) categoriasSet.add(p.categoria);
                }
                return profs || [];
            } catch (e) {
                console.error("Erro na conexão:", e);
                return [];
            }
        }

        function renderizarCategorias() {
            const container = document.getElementById('categoriasContainer');
            if (!container) return;
            container.innerHTML = `<button class="categoria-btn active" data-cat="todos">📋 Todos</button>`;
            
            const sorted = Array.from(categoriasSet).sort();
            for (let cat of sorted) {
                const btn = document.createElement('button');
                btn.className = 'categoria-btn';
                btn.setAttribute('data-cat', cat);
                btn.innerText = categoriaDisplay[cat] || cat.charAt(0).toUpperCase() + cat.slice(1);
                btn.onclick = () => {
                    document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categoriaAtiva = cat;
                    renderizarCards();
                };
                container.appendChild(btn);
            }
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-cat-btn';
            addBtn.innerText = '+ Nova categoria';
            addBtn.onclick = () => {
                let nova = prompt("Digite o nome da nova categoria");
                if (nova && nova.trim()) {
                    let key = nova.trim().toLowerCase().replace(/\s/g, '');
                    categoriasSet.add(key);
                    categoriaDisplay[key] = nova.trim();
                    renderizarCategorias();
                    atualizarSelectCategorias();
                }
            };
            container.appendChild(addBtn);
        }

        function atualizarSelectCategorias() {
            const select = document.getElementById('modalCategoria');
            if (!select) return;
            select.innerHTML = '';
            for (let cat of categoriasSet) {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = categoriaDisplay[cat] || cat;
                select.appendChild(opt);
            }
        }

        function calcularMediaEstrelas(prof) {
            if (!prof) return { media: 0, count: 0 };
            
            let soma = 0;
            let count = 0;

            // Consider the main review's rating
            if (prof.nota_principal && prof.nota_principal > 0) {
                soma += prof.nota_principal;
                count++;
            }

            // Add ratings from other reviews
            if (prof.avaliacoes && prof.avaliacoes.length > 0) {
                for (const av of prof.avaliacoes) {
                    if (av.nota && av.nota > 0) {
                        soma += av.nota;
                        count++;
                    }
                }
            }

            if (count === 0) {
                return { media: 0, count: 0 };
            }

            const media = (soma / count).toFixed(1);
            return { media, count };
        }

        async function renderizarCards() {
            const container = document.getElementById('listaProfissionais');
            if (!container) return;
            container.innerHTML = '<div class="loading">🔄 Carregando indicações...</div>';
            
            const profissionais = await carregarProfissionais();
            
            let filtrados = categoriaAtiva === 'todos' ? profissionais : profissionais.filter(p => p.categoria === categoriaAtiva);
            
            if (filtrados.length === 0) {
                container.innerHTML = `<div style="background:#fff; border-radius:24px; padding:40px 20px; text-align:center; color:#1E3A5F;">🏠 Nenhum profissional nesta categoria.<br>Seja o primeiro a indicar!</div>`;
                return;
            }
            
            container.innerHTML = '';
            for (let prof of filtrados) {
                const { media, count } = calcularMediaEstrelas(prof);
                const estrelasInt = Math.round(media);
                const estrelasHtml = Array(5).fill().map((_, i) => `<span class="star ${i < estrelasInt ? 'filled' : ''}">★</span>`).join('');
                
                const generateRatingStars = (rating) => {
                    if (!rating || rating <= 0) return '';
                    const filled = '★'.repeat(rating);
                    const empty = '☆'.repeat(5 - rating);
                    return `<span style="color: #F97316;">${filled}</span><span style="color: #cbd5e1;">${empty}</span>`;
                };
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="prof-title">
                            <span class="prof-name">${escapeHtml(prof.nome)}</span>
                            <span class="categoria-tag">${categoriaDisplay[prof.categoria] || prof.categoria}</span>
                        </div>
                        <div class="rating-stars">${estrelasHtml}<span class="rating-value">(${media} de ${count} ${count === 1 ? 'avaliação' : 'avaliações'})</span></div>
                        <div class="contact-info">
                            <span>📞 ${escapeHtml(prof.telefone)}</span>
                            ${prof.endereco ? `<span>📍 ${escapeHtml(prof.endereco)}</span>` : ''}
                        </div>
                    </div>
                    ${(prof.fotos_servico && prof.fotos_servico.length) ? `
                        <div class="photos-area">
                            <div class="photos-label">📸 Mídia do serviço</div>
                            <div class="photos-list">${prof.fotos_servico.map(url => {
                                const isVideo = ['.mp4', '.mov', '.webm'].some(ext => url.toLowerCase().includes(ext));
                                return isVideo 
                                    ? `<a href="${url}" target="_blank" class="photo-badge">📹 Vídeo</a>`
                                    : `<a href="${url}" target="_blank" class="photo-badge">📷 Foto</a>`;
                            }).join('')}</div>
                        </div>
                    ` : ''}
                    <div class="reviews-area">
                        <div style="font-weight:600; margin-bottom:10px; font-size:0.75rem; color:#1E3A5F;">🗣️ Avaliações</div>
                        <div class="review-item">
                            <div class="review-header">
                                <span><strong>${escapeHtml(prof.indicado_por)}</strong> (AP ${escapeHtml(prof.ap_indicador)})</span>
                                <span>${generateRatingStars(prof.nota_principal)}</span>
                            </div>
                            <div class="review-text">${escapeHtml(prof.avaliacao_principal)}</div>
                        </div>
                        ${(prof.avaliacoes || []).map(av => `
                            <div class="review-item">
                                <div class="review-header">
                                    <span>👤 ${escapeHtml(av.nome)} (AP ${escapeHtml(av.ap)})</span>
                                    <span>${generateRatingStars(av.nota)}</span>
                                </div>
                                <div class="review-text">${escapeHtml(av.comentario)}</div>
                                ${(av.fotos && av.fotos.length) ? `<div class="photos-list" style="margin-top:8px;">${av.fotos.map(url => {
                                    const isVideo = ['.mp4', '.mov', '.webm'].some(ext => url.toLowerCase().includes(ext));
                                    return isVideo 
                                        ? `<a href="${url}" target="_blank" class="photo-badge">📹 Vídeo</a>`
                                        : `<a href="${url}" target="_blank" class="photo-badge">📷 Foto</a>`;
                                }).join('')}</div>` : ''}
                            </div>
                        `).join('')}
                        <button class="btn-add-review" data-id="${prof.id}">+ Adicionar avaliação</button>
                        <div id="rev-${prof.id}" class="inline-review-form">
                            <div class="form-group" style="margin-bottom: 8px;">
                                <label style="margin-bottom: 4px;">Sua nota *</label>
                                <div id="starRev_${prof.id}" class="star-rating-input" data-rating="0"></div>
                            </div>
                            <div class="review-input-row">
                                <input type="text" id="nomeRev_${prof.id}" placeholder="Seu nome *">
                                <input type="text" id="apRev_${prof.id}" placeholder="Seu AP *">
                            </div>
                            <textarea id="comentRev_${prof.id}" class="review-form-text" rows="2" placeholder="Sua avaliação * (mín. 20 caracteres)"></textarea>
                            
                            <div class="form-group">
                                <div id="mediaUploadRev_${prof.id}" class="media-upload-area" style="padding: 10px; font-size: 0.8rem;">
                                    <span>+ Adicionar fotos/vídeos</span>
                                    <input type="file" id="fileInputRev_${prof.id}" multiple accept="image/*,video/*">
                                </div>
                                <div id="mediaPreviewsRev_${prof.id}" class="media-previews"></div>
                            </div>

                            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
                                <button class="btn-cancel-review" data-id="${prof.id}" style="background:transparent; border:1px solid #cbd5e1; border-radius:30px; padding:6px 12px;">Cancelar</button>
                                <button class="btn-submit-review" data-id="${prof.id}" style="background:#F97316; border:none; border-radius:30px; padding:6px 16px; color:white;">Enviar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // Initialize interactive elements for the new card
                createStarRating(document.getElementById(`starRev_${prof.id}`));
                
                const mediaUploadArea = document.getElementById(`mediaUploadRev_${prof.id}`);
                const fileInput = document.getElementById(`fileInputRev_${prof.id}`);
                const previewsContainer = document.getElementById(`mediaPreviewsRev_${prof.id}`);
                
                reviewFiles.set(prof.id, []); // Initialize file list for this review form

                if(mediaUploadArea) mediaUploadArea.onclick = () => fileInput.click();
                if(fileInput) fileInput.onchange = () => handleFileSelect(fileInput, previewsContainer, reviewFiles.get(prof.id));
            }
            
            // Eventos
            document.querySelectorAll('.btn-add-review').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    document.querySelectorAll('.inline-review-form').forEach(f => f.classList.remove('show'));
                    const form = document.getElementById(`rev-${id}`);
                    if (form) form.classList.add('show');
                };
            });
            
            document.querySelectorAll('.btn-submit-review').forEach(btn => {
                btn.onclick = async () => {
                    const id = btn.getAttribute('data-id');
                    btn.disabled = true;
                    btn.innerText = 'Enviando...';

                    const rating = parseInt(document.getElementById(`starRev_${id}`)?.dataset.rating || '0');
                    const nome = document.getElementById(`nomeRev_${id}`)?.value.trim();
                    const ap = document.getElementById(`apRev_${id}`)?.value.trim();
                    const coment = document.getElementById(`comentRev_${id}`)?.value.trim();
                    
                    if (!nome || !ap || !coment || rating === 0) {
                        alert("Preencha nome, AP, avaliação e dê uma nota (estrelas).");
                        btn.disabled = false;
                        btn.innerText = 'Enviar';
                        return;
                    }

                    if (coment.length < MIN_REVIEW_LENGTH) {
                        alert(`Sua avaliação deve ter no mínimo ${MIN_REVIEW_LENGTH} caracteres.`);
                        btn.disabled = false;
                        btn.innerText = 'Enviar';
                        return;
                    }
                    
                    const filesToUpload = reviewFiles.get(id) || [];
                    const mediaUrls = await uploadMedia(filesToUpload, id);

                    const { error } = await supabaseClient.from('avaliacoes').insert({
                        profissional_id: id,
                        nome, 
                        ap,
                        comentario: coment,
                        nota: rating,
                        fotos: mediaUrls
                    });
                    
                    if (error) {
                        alert("Erro: " + error.message);
                        btn.disabled = false;
                        btn.innerText = 'Enviar';
                    } else {
                        alert("✅ Avaliação enviada!");
                        renderizarCards(); // This will re-render everything and clear the form
                    }
                };
            });
            
            document.querySelectorAll('.btn-cancel-review').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    document.getElementById(`rev-${id}`)?.classList.remove('show');
                };
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Configurar eventos do modal
        function configurarModal() {
            const openBtn = document.getElementById('openModalBtn');
            const modal = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('closeModalBtn');
            
            if (openBtn) openBtn.onclick = () => modal.classList.add('active');
            if (closeBtn) closeBtn.onclick = () => modal.classList.remove('active');
            if (modal) modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

            // Initialize interactive elements in the modal
            createStarRating(document.getElementById('modalStarRating'));

            const mediaUploadArea = document.getElementById('modalMediaUpload');
            const fileInput = document.getElementById('modalFileInput');
            const previewsContainer = document.getElementById('modalMediaPreviews');

            mediaUploadArea.onclick = () => fileInput.click();
            fileInput.onchange = () => handleFileSelect(fileInput, previewsContainer, modalFiles);
            
            const submitBtn = document.getElementById('submitProfissional');
            if (submitBtn) {
                submitBtn.onclick = async () => {
                    submitBtn.disabled = true;
                    submitBtn.innerText = 'Cadastrando...';

                    const nome = document.getElementById('modalNome').value.trim();
                    const categoria = document.getElementById('modalCategoria').value;
                    const telefone = document.getElementById('modalTelefone').value.trim();
                    const endereco = document.getElementById('modalEndereco').value.trim();
                    const indicador = document.getElementById('modalIndicador').value.trim();
                    const ap = document.getElementById('modalAp').value.trim();
                    const avaliacao = document.getElementById('modalAvaliacao').value.trim();
                    const rating = parseInt(document.getElementById('modalStarRating').dataset.rating || '0');
                    
                    if (!nome || !telefone || !indicador || !ap || !avaliacao || rating === 0) {
                        alert("Preencha todos os campos obrigatórios, incluindo a nota (estrelas).");
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Cadastrar profissional';
                        return;
                    }

                    if (avaliacao.length < MIN_REVIEW_LENGTH) {
                        alert(`Sua avaliação deve ter no mínimo ${MIN_REVIEW_LENGTH} caracteres.`);
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Cadastrar profissional';
                        return;
                    }
                    
                    const tempId = Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                    const mediaUrls = await uploadMedia(modalFiles, tempId);
                    
                    const { error } = await supabaseClient.from('profissionais').insert({
                        nome, categoria, telefone, endereco,
                        indicado_por: indicador,
                        ap_indicador: ap,
                        avaliacao_principal: avaliacao,
                        nota_principal: rating,
                        fotos_servico: mediaUrls
                    });
                    
                    if (error) {
                        alert("Erro ao cadastrar: " + error.message);
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Cadastrar profissional';
                    } else {
                        alert("✅ Profissional cadastrado!");
                        modal.classList.remove('active');
                        
                        // Reset form
                        document.getElementById('modalNome').value = '';
                        document.getElementById('modalTelefone').value = '';
                        document.getElementById('modalEndereco').value = '';
                        document.getElementById('modalIndicador').value = '';
                        document.getElementById('modalAp').value = '';
                        document.getElementById('modalAvaliacao').value = '';
                        document.getElementById('modalStarRating').dataset.rating = '0';
                        document.querySelectorAll('#modalStarRating .star-input').forEach(s => s.classList.remove('filled'));
                        previewsContainer.innerHTML = '';
                        modalFiles.length = 0;

                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Cadastrar profissional';

                        renderizarCards();
                    }
                };
            }
        }

        function carregarTudo() {
            renderizarCategorias();
            atualizarSelectCategorias();
            renderizarCards();
            configurarModal();
        }
    })();
</script>
</body>
</html>
