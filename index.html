<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My House | Indicações entre Vizinhos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #F4F7FC;
            color: #1a2a3a;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* CABEÇALHO */
        .header-minimal {
            padding: 20px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 2px solid #1E3A5F;
            margin-bottom: 24px;
        }

        @media (min-width: 600px) {
            .header-minimal {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            body {
                padding: 0 20px 60px;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background-color: #1E3A5F;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1E3A5F;
        }

        .logo-text span {
            color: #F97316;
        }

        .new-post-btn {
            background-color: #1E3A5F;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
        }

        @media (min-width: 600px) {
            .new-post-btn {
                width: auto;
            }
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            position: relative;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #F97316;
            padding-left: 12px;
            color: #1E3A5F;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #8f9fb0;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #1E3A5F;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            border: 1.5px solid #cbd5e1;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.9rem;
            background: #fff;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #F97316;
            outline: none;
        }

        .inline-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 450px) {
            .inline-row {
                flex-direction: row;
            }
            .inline-row .form-group {
                flex: 1;
            }
        }

        .btn-submit-modal {
            background: #F97316;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
        }

        /* CATEGORIAS */
        .categorias-wrapper {
            margin-bottom: 24px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
        }

        .categorias-container {
            display: inline-flex;
            gap: 8px;
        }

        .categoria-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1E3A5F;
            cursor: pointer;
            white-space: nowrap;
        }

        .categoria-btn.active {
            background: #1E3A5F;
            border-color: #1E3A5F;
            color: white;
        }

        .add-cat-btn {
            background: #f1f5f9;
            border: 1px dashed #F97316;
            border-radius: 32px;
            padding: 8px 16px;
            font-size: 0.75rem;
            color: #F97316;
            cursor: pointer;
            white-space: nowrap;
        }

        /* CARDS */
        .profissionais-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .card-header {
            padding: 16px;
        }

        .prof-title {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 8px;
        }

        .prof-name {
            font-size: 1.2rem;
            font-weight: 800;
            color: #1E3A5F;
        }

        .categoria-tag {
            font-size: 0.65rem;
            background: #EFF6FF;
            padding: 4px 10px;
            border-radius: 30px;
            color: #1E3A5F;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .star {
            color: #cbd5e1;
            font-size: 1rem;
        }

        .star.filled {
            color: #F97316;
        }

        .rating-value {
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-left: 4px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.7rem;
            color: #5b6e8c;
            margin-top: 10px;
        }

        .contact-info span {
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .photos-area {
            padding: 12px 16px;
            background: #fefefe;
            border-top: 1px solid #eef2f8;
            border-bottom: 1px solid #eef2f8;
        }

        .photos-label {
            font-size: 0.6rem;
            font-weight: 700;
            color: #F97316;
            margin-bottom: 6px;
        }

        .photos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .photo-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            cursor: pointer;
        }

        .photo-badge:hover {
            background: #F97316;
            color: white;
        }

        .reviews-area {
            padding: 14px 16px;
        }

        .review-item {
            background: #F8FAFE;
            border-left: 3px solid #F97316;
            padding: 10px 12px;
            border-radius: 14px;
            margin-bottom: 10px;
        }

        .review-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 0.65rem;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 6px;
            gap: 8px;
        }

        .review-stars {
            display: inline-flex;
            gap: 2px;
        }

        .review-star {
            color: #cbd5e1;
            font-size: 0.7rem;
        }

        .review-star.filled {
            color: #F97316;
        }

        .review-text {
            font-size: 0.8rem;
            color: #2d3e50;
            line-height: 1.4;
        }

        .btn-add-review {
            background: none;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            color: #F97316;
            width: 100%;
        }

        @media (min-width: 450px) {
            .btn-add-review {
                width: auto;
            }
        }

        .inline-review-form {
            margin-top: 14px;
            background: #f9fafc;
            border-radius: 18px;
            padding: 12px;
            display: none;
        }

        .inline-review-form.show {
            display: block;
        }

        .review-input-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }

        @media (min-width: 450px) {
            .review-input-row {
                flex-direction: row;
            }
            .review-input-row input {
                flex: 1;
            }
        }

        .review-input-row input, .review-form-text {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.75rem;
        }

        .review-form-text {
            border-radius: 16px;
            margin: 8px 0;
            resize: vertical;
        }

        /* ESTRELAS PARA AVALIAÇÃO */
        .star-rating-input {
            display: flex;
            gap: 8px;
            font-size: 1.8rem;
            cursor: pointer;
            margin: 8px 0;
            justify-content: center;
        }

        .star-rating-input .star {
            color: #cbd5e1;
            transition: color 0.2s;
        }

        .star-rating-input .star.filled {
            color: #F97316;
        }

        /* UPLOAD DE MÍDIA */
        .media-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            font-size: 0.8rem;
            color: #5b6e8c;
            margin-bottom: 8px;
        }

        .media-upload-area:hover {
            border-color: #F97316;
            background-color: #fff7ed;
        }

        .media-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .media-preview-item {
            position: relative;
            width: 60px;
            height: 60px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .media-preview-item img, .media-preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #8ba0b5;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #F97316;
        }

        /* LIGHTBOX PARA MÍDIA */
        .lightbox-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .lightbox-overlay.show {
            display: flex;
        }
        .lightbox-content {
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lightbox-content img, .lightbox-content video {
            max-width: 100%;
            max-height: 100%;
            display: block;
            border-radius: 8px;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: 300;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-minimal">
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">My <span>House</span></div>
        </div>
        <button class="new-post-btn" id="openModalBtn">+ Nova indicação</button>
    </div>

    <div class="categorias-wrapper">
        <div class="categorias-container" id="categoriasContainer"></div>
    </div>

    <div id="listaProfissionais" class="profissionais-grid">
        <div class="loading">🔄 Carregando indicações...</div>
    </div>

    <footer>My House • indicações entre vizinhos • dados salvos na nuvem</footer>
</div>

<!-- MODAL NOVA INDICAÇÃO -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3>Nova indicação</h3>
        <div class="form-group">
            <label>Profissional / Empresa</label>
            <input type="text" id="modalNome" placeholder="Ex: Gran Design">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select id="modalCategoria"></select>
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="modalTelefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
            <label>Endereço (opcional)</label>
            <input type="text" id="modalEndereco" placeholder="Rua, número...">
        </div>
        <div class="inline-row">
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" id="modalIndicador" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Seu AP</label>
                <input type="text" id="modalAp" placeholder="Bloco, nº">
            </div>
        </div>
        <div class="form-group">
            <label>Sua nota *</label>
            <div id="modalStarRating" class="star-rating-input" data-rating="5"></div>
        </div>
        <div class="form-group">
            <label>Sua avaliação * (mín. 20 caracteres)</label>
            <textarea rows="3" id="modalAvaliacao" placeholder="Conte sua experiência..."></textarea>
        </div>
        <div class="form-group">
            <label>Fotos e Vídeos (opcional)</label>
            <div id="modalMediaUpload" class="media-upload-area">
                📸 Clique para adicionar fotos ou vídeos
                <input type="file" id="modalFileInput" multiple accept="image/*,video/*" style="display:none">
            </div>
            <div id="modalMediaPreviews" class="media-previews"></div>
        </div>
        <button class="btn-submit-modal" id="submitProfissional">Cadastrar profissional</button>
    </div>
</div>

<!-- LIGHTBOX PARA MÍDIA -->
<div id="lightboxOverlay" class="lightbox-overlay">
    <span class="lightbox-close">&times;</span>
    <div id="lightboxContent" class="lightbox-content">
        <!-- Imagem ou vídeo será inserido aqui via JS -->
    </div>
</div>

<script>
    (function() {
        // ============================================
        // CONFIGURAÇÕES DO SUPABASE
        // ============================================
        const SUPABASE_URL = "https://kjbbthydceoqqppxhpwb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ln29EqiHlLAnoFzQwGFPmQ_UfDK4-Wq";
        const BUCKET_NAME = "my-house-media";
        // ============================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let categoriaAtiva = "todos";
        let categoriasSet = new Set(["moveis", "eletricistas", "ar-condicionado", "marmores", "obras", "gesso", "outros"]);
        const categoriaDisplay = {
            moveis: "Móveis",
            eletricistas: "Eletricistas",
            "ar-condicionado": "Ar Condicionado",
            marmores: "Mármores/Granitos",
            obras: "Obras/Reformas",
            gesso: "Gesso",
            outros: "Outros"
        };

        let modalFiles = [];
        let reviewFilesMap = new Map();

        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        // Configurar estrelas clicáveis
        function setupStarRating(containerId, initialRating = 5) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '★';
                star.dataset.value = i;
                star.onclick = () => {
                    const rating = parseInt(star.dataset.value);
                    container.dataset.rating = rating;
                    const stars = container.querySelectorAll('.star');
                    stars.forEach(s => {
                        if (parseInt(s.dataset.value) <= rating) {
                            s.classList.add('filled');
                        } else {
                            s.classList.remove('filled');
                        }
                    });
                };
                container.appendChild(star);
            }
            
            const stars = container.querySelectorAll('.star');
            stars.forEach(s => {
                if (parseInt(s.dataset.value) <= initialRating) {
                    s.classList.add('filled');
                }
            });
            container.dataset.rating = initialRating;
        }

        // Upload de arquivos para o Storage
        async function uploadFiles(files, folder) {
            if (!files || files.length === 0) return [];
            
            const urls = [];
            for (const file of files) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${folder}/${Date.now()}-${Math.random().toString(36).substr(2, 6)}.${fileExt}`;
                
                const { error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(fileName, file);
                
                if (error) {
                    console.error("Upload error:", error);
                    continue;
                }
                
                const { data: urlData } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(fileName);
                
                if (urlData) urls.push(urlData.publicUrl);
            }
            return urls;
        }

        // Lida com a pré-visualização de arquivos
        function handleFilePreviews(fileInput, previewsContainer, fileList) {
            previewsContainer.innerHTML = '';
            fileList.length = 0; // Limpa a lista de arquivos associada

            const files = Array.from(fileInput.files);

            files.forEach(file => {
                fileList.push(file);

                const url = URL.createObjectURL(file);
                const isVideo = file.type.startsWith('video/');
                const previewItem = document.createElement('div');
                previewItem.className = 'media-preview-item';

                const mediaElement = isVideo ? document.createElement('video') : document.createElement('img');
                mediaElement.src = url;
                if (isVideo) mediaElement.muted = true;

                previewItem.appendChild(mediaElement);

                const removeBtn = document.createElement('span');
                removeBtn.className = 'media-remove-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = (e) => {
                    e.stopPropagation(); // Impede que o lightbox abra ao clicar no 'x'
                    const index = fileList.indexOf(file);
                    if (index > -1) fileList.splice(index, 1);
                    previewItem.remove();
                    URL.revokeObjectURL(url);
                };
                previewItem.appendChild(removeBtn);

                // Adiciona o clique para abrir o lightbox
                previewItem.onclick = () => openLightbox(url, isVideo);

                previewsContainer.appendChild(previewItem);
            });
        }

        // Verifica se uma URL é de um vídeo
        function isUrlVideo(url) {
            if (!url) return false;
            const videoExtensions = ['.mp4', '.mov', '.webm', '.ogg'];
            return videoExtensions.some(ext => url.toLowerCase().includes(ext));
        }

        function renderMediaBadge(url) {
            const isVideo = isUrlVideo(url);
            const label = isVideo ? '📹 Vídeo' : '📷 Foto';
            return `<div class="photo-badge" onclick="openLightbox('${escapeHtml(url)}', ${isVideo})">${label}</div>`;
        }

        // Carregar profissionais do banco
        async function carregarProfissionais() {
            try {
                const { data: profs, error } = await supabase
                    .from('profissionais')
                    .select('*')
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                
                for (let p of profs || []) {
                    const { data: avals } = await supabase
                        .from('avaliacoes')
                        .select('*')
                        .eq('profissional_id', p.id)
                        .order('created_at', { ascending: false });
                    p.avaliacoes = avals || [];
                    if (p.categoria) categoriasSet.add(p.categoria);
                }
                return profs || [];
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        // Calcular média de estrelas
        function calcularMedia(prof) {
            let soma = prof.nota_principal || 5;
            let count = 1;
            
            if (prof.avaliacoes && prof.avaliacoes.length) {
                prof.avaliacoes.forEach(av => {
                    if (av.nota) {
                        soma += av.nota;
                        count++;
                    }
                });
            }
            return (soma / count).toFixed(1);
        }

        // Renderizar estrelas
        function renderStars(rating) {
            const filled = Math.floor(rating);
            return Array(5).fill().map((_, i) => 
                `<span class="star ${i < filled ? 'filled' : ''}">★</span>`
            ).join('');
        }

        function renderSmallStars(rating) {
            const filled = Math.floor(rating);
            return Array(5).fill().map((_, i) => 
                `<span class="review-star ${i < filled ? 'filled' : ''}">★</span>`
            ).join('');
        }

        // Renderizar categorias
        function renderizarCategorias() {
            const container = document.getElementById('categoriasContainer');
            if (!container) return;
            container.innerHTML = ''; // Limpa para reconstruir de forma consistente
            
            const allCats = ['todos', ...Array.from(categoriasSet).sort()];

            for (const cat of allCats) {
                const btn = document.createElement('button');
                btn.className = 'categoria-btn';
                btn.setAttribute('data-cat', cat);
                btn.innerText = cat === 'todos' 
                    ? '📋 Todos' 
                    : categoriaDisplay[cat] || cat;

                if (cat === categoriaAtiva) {
                    btn.classList.add('active');
                }

                btn.onclick = () => {
                    document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categoriaAtiva = cat;
                    renderizarCards();
                };
                container.appendChild(btn);
            }
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-cat-btn';
            addBtn.innerText = '+ Nova categoria';
            addBtn.onclick = () => {
                let nova = prompt("Digite o nome da nova categoria");
                if (nova && nova.trim()) {
                    let key = nova.trim().toLowerCase().replace(/\s/g, '');
                    categoriasSet.add(key);
                    categoriaDisplay[key] = nova.trim();
                    renderizarCategorias();
                    atualizarSelectCategorias();
                }
            };
            container.appendChild(addBtn);
        }

        function atualizarSelectCategorias() {
            const select = document.getElementById('modalCategoria');
            if (!select) return;
            select.innerHTML = '';
            for (let cat of categoriasSet) {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = categoriaDisplay[cat] || cat;
                select.appendChild(opt);
            }
        }

        // Renderizar cards de profissionais
        async function renderizarCards() {
            const container = document.getElementById('listaProfissionais');
            container.innerHTML = '<div class="loading">🔄 Carregando...</div>';
            
            const profissionais = await carregarProfissionais();

            // Após carregar, o `categoriasSet` pode ter novos itens.
            // Verificamos se o número de botões de categoria renderizados corresponde ao tamanho do Set.
            // Isso corrige o bug de uma nova categoria não aparecer na barra superior.
            const renderedCatButtons = document.querySelectorAll('#categoriasContainer .categoria-btn');
            if (renderedCatButtons.length !== categoriasSet.size + 1) { // +1 para o botão "Todos"
                renderizarCategorias();
                atualizarSelectCategorias();
            }
            
            let filtrados = categoriaAtiva === 'todos' ? profissionais : profissionais.filter(p => p.categoria === categoriaAtiva);
            
            if (filtrados.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px;">🏠 Nenhum profissional encontrado</div>`;
                return;
            }
            
            container.innerHTML = '';
            for (let prof of filtrados) {
                const media = calcularMedia(prof);
                
                let avaliacoesHtml = `
                    <div class="review-item">
                        <div class="review-header">
                            <span><strong>${escapeHtml(prof.indicado_por)}</strong> (AP ${escapeHtml(prof.ap_indicador)})</span>
                            <div class="review-stars">${renderSmallStars(prof.nota_principal || 5)}</div>
                        </div>
                        <div class="review-text">${escapeHtml(prof.avaliacao_principal)}</div>
                    </div>
                `;
                
                if (prof.avaliacoes && prof.avaliacoes.length) {
                    prof.avaliacoes.forEach(av => {
                        avaliacoesHtml += `
                            <div class="review-item">
                                <div class="review-header">
                                    <span>👤 ${escapeHtml(av.nome)} (AP ${escapeHtml(av.ap)})</span>
                                    <div class="review-stars">${renderSmallStars(av.nota || 5)}</div>
                                </div>
                                <div class="review-text">${escapeHtml(av.comentario)}</div>
                                ${av.fotos && av.fotos.length ? `<div class="photos-list">${av.fotos.map(renderMediaBadge).join('')}</div>` : ''}
                            </div>
                        `;
                    });
                }
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="prof-title">
                            <span class="prof-name">${escapeHtml(prof.nome)}</span>
                            <span class="categoria-tag">${categoriaDisplay[prof.categoria] || prof.categoria}</span>
                        </div>
                        <div class="rating-stars">${renderStars(media)}<span class="rating-value">(${media})</span></div>
                        <div class="contact-info">
                            <span>📞 ${escapeHtml(prof.telefone)}</span>
                            ${prof.endereco ? `<span>📍 ${escapeHtml(prof.endereco)}</span>` : ''}
                        </div>
                    </div>
                    ${prof.fotos_servico && prof.fotos_servico.length ? `
                        <div class="photos-area">
                            <div class="photos-label">📸 Fotos do serviço</div>
                            <div class="photos-list">${prof.fotos_servico.map(renderMediaBadge).join('')}</div>
                        </div>
                    ` : ''}
                    <div class="reviews-area">
                        <div style="font-weight:600; margin-bottom:10px;">🗣️ Avaliações</div>
                        ${avaliacoesHtml}
                        <button class="btn-add-review" data-id="${prof.id}">⭐ Avaliar este profissional</button>
                        <div id="rev-${prof.id}" class="inline-review-form">
                            <div style="text-align:center; margin-bottom:10px;">
                                <div class="star-rating-input" id="starRev_${prof.id}" data-rating="5"></div>
                            </div>
                            <div class="review-input-row">
                                <input type="text" id="nomeRev_${prof.id}" placeholder="Seu nome *">
                                <input type="text" id="apRev_${prof.id}" placeholder="Seu AP *">
                            </div>
                            <textarea id="comentRev_${prof.id}" class="review-form-text" rows="3" placeholder="Sua avaliação * (mín. 20 caracteres)"></textarea>
                            <div class="media-upload-area" id="uploadAreaRev_${prof.id}">
                                📸 Adicionar foto/vídeo
                                <input type="file" id="fileRev_${prof.id}" accept="image/*,video/*" style="display:none" multiple>
                            </div>
                            <div id="previewRev_${prof.id}" class="media-previews"></div>
                            <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
                                <button class="btn-cancel-review" data-id="${prof.id}">Cancelar</button>
                                <button class="btn-submit-review" data-id="${prof.id}" style="background:#F97316; color:white; border:none; padding:8px 20px; border-radius:30px;">Enviar</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                
                // Inicializar componentes do card
                reviewFilesMap.set(prof.id, []);
                setupStarRating(`starRev_${prof.id}`, 5);
                
                // Configurar upload de arquivos
                const uploadArea = document.getElementById(`uploadAreaRev_${prof.id}`);
                const fileInput = document.getElementById(`fileRev_${prof.id}`);
                const previewContainer = document.getElementById(`previewRev_${prof.id}`);
                
                if (uploadArea && fileInput) {
                    uploadArea.onclick = () => fileInput.click();
                    fileInput.onchange = () => handleFilePreviews(fileInput, previewContainer, reviewFilesMap.get(prof.id));
                }
                
                // Botão de enviar avaliação
                const submitBtn = card.querySelector(`.btn-submit-review[data-id="${prof.id}"]`);
                if (submitBtn) {
                    submitBtn.onclick = async () => {
                        submitBtn.disabled = true;
                        submitBtn.innerText = 'Enviando...';
                        
                        const rating = parseInt(document.getElementById(`starRev_${prof.id}`)?.dataset.rating || '5');
                        const nome = document.getElementById(`nomeRev_${prof.id}`)?.value.trim();
                        const ap = document.getElementById(`apRev_${prof.id}`)?.value.trim();
                        const coment = document.getElementById(`comentRev_${prof.id}`)?.value.trim();
                        
                        if (!nome || !ap || !coment) {
                            alert("Preencha todos os campos");
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'Enviar';
                            return;
                        }
                        
                        if (coment.length < 20) {
                            alert("Avaliação deve ter no mínimo 20 caracteres");
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'Enviar';
                            return;
                        }
                        
                        let fotosUrls = [];
                        const filesToUpload = reviewFilesMap.get(prof.id);
                        if (filesToUpload && filesToUpload.length > 0) {
                            fotosUrls = await uploadFiles(filesToUpload, `avaliacoes/${prof.id}`);
                        }
                        
                        const { error } = await supabase.from('avaliacoes').insert({
                            id: generateId(),
                            profissional_id: prof.id,
                            nome, ap,
                            comentario: coment,
                            nota: rating,
                            fotos: fotosUrls
                        });
                        
                        if (error) {
                            alert("Erro: " + error.message);
                        } else {
                            alert("✅ Avaliação enviada!");
                            renderizarCards();
                        }
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Enviar';
                    };
                }
            }
            
            // Eventos dos botões
            document.querySelectorAll('.btn-add-review').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    document.querySelectorAll('.inline-review-form').forEach(f => f.classList.remove('show'));
                    document.getElementById(`rev-${id}`)?.classList.add('show');
                };
            });
            
            document.querySelectorAll('.btn-cancel-review').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    document.getElementById(`rev-${id}`)?.classList.remove('show');
                };
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Configurar modal de novo profissional
        function configurarModal() {
            setupStarRating('modalStarRating', 5);
            
            const uploadArea = document.getElementById('modalMediaUpload');
            const fileInput = document.getElementById('modalFileInput');
            const previewsContainer = document.getElementById('modalMediaPreviews');
            
            if (uploadArea && fileInput) {
                uploadArea.onclick = () => fileInput.click();
                fileInput.onchange = () => handleFilePreviews(fileInput, previewsContainer, modalFiles);
            }
            
            const openBtn = document.getElementById('openModalBtn');
            const modal = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('closeModalBtn');
            
            openBtn.onclick = () => modal.classList.add('active');
            closeBtn.onclick = () => modal.classList.remove('active');
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
            
            const submitBtn = document.getElementById('submitProfissional');
            submitBtn.onclick = async () => {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Cadastrando...';
                
                const nome = document.getElementById('modalNome').value.trim();
                const categoria = document.getElementById('modalCategoria').value;
                const telefone = document.getElementById('modalTelefone').value.trim();
                const endereco = document.getElementById('modalEndereco').value.trim();
                const indicador = document.getElementById('modalIndicador').value.trim();
                const ap = document.getElementById('modalAp').value.trim();
                const avaliacao = document.getElementById('modalAvaliacao').value.trim();
                const nota = parseInt(document.getElementById('modalStarRating').dataset.rating || '5');
                
                if (!nome || !telefone || !indicador || !ap || !avaliacao) {
                    alert("Preencha todos os campos obrigatórios");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Cadastrar profissional';
                    return;
                }
                
                if (avaliacao.length < 20) {
                    alert("Avaliação deve ter no mínimo 20 caracteres");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Cadastrar profissional';
                    return;
                }
                
                const profissionalId = generateId();
                let fotosUrls = [];
                if (modalFiles.length > 0) {
                    fotosUrls = await uploadFiles(modalFiles, `profissionais/${profissionalId}`);
                }
                
                const { error } = await supabase.from('profissionais').insert({
                    id: profissionalId,
                    nome, categoria, telefone, endereco,
                    indicado_por: indicador,
                    ap_indicador: ap,
                    avaliacao_principal: avaliacao,
                    nota_principal: nota,
                    fotos_servico: fotosUrls
                });
                
                if (error) {
                    alert("Erro ao cadastrar: " + error.message);
                } else {
                    alert("✅ Profissional cadastrado com sucesso!");
                    modal.classList.remove('active');
                    document.getElementById('modalNome').value = '';
                    document.getElementById('modalTelefone').value = '';
                    document.getElementById('modalEndereco').value = '';
                    document.getElementById('modalIndicador').value = '';
                    document.getElementById('modalAp').value = '';
                    document.getElementById('modalAvaliacao').value = '';
                    modalFiles = [];
                    document.getElementById('modalMediaPreviews').innerHTML = '';
                    renderizarCards();
                }
                submitBtn.disabled = false;
                submitBtn.innerText = 'Cadastrar profissional';
            };
        }

        // Funções do Lightbox
        let lightboxOverlay, lightboxContent;

        function initLightbox() {
            lightboxOverlay = document.getElementById('lightboxOverlay');
            lightboxContent = document.getElementById('lightboxContent');
            const lightboxClose = lightboxOverlay.querySelector('.lightbox-close');

            const closeAction = () => {
                lightboxOverlay.classList.remove('show');
                lightboxContent.innerHTML = ''; // Para parar vídeos
            };

            lightboxOverlay.onclick = (e) => {
                if (e.target === lightboxOverlay) closeAction();
            };
            lightboxClose.onclick = closeAction;
        }

        function openLightbox(src, isVideo = false) {
            lightboxContent.innerHTML = '';
            if (isVideo) {
                const video = document.createElement('video');
                video.src = src;
                video.controls = true;
                video.autoplay = true;
                lightboxContent.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = src;
                lightboxContent.appendChild(img);
            }
            lightboxOverlay.classList.add('show');
        }

        window.openLightbox = openLightbox; // Expor globalmente para ser acessível pelo onclick

        // Inicializar
        renderizarCategorias();
        atualizarSelectCategorias();
        renderizarCards();
        configurarModal();
        initLightbox();
    })();
</script>
</body>
</html>
