<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My House | Indicações entre Vizinhos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #F4F7FC;
            color: #1a2a3a;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-minimal {
            padding: 20px 0 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            border-bottom: 2px solid #1E3A5F;
            margin-bottom: 24px;
        }

        @media (min-width: 600px) {
            .header-minimal {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            body {
                padding: 0 20px 60px;
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            background-color: #1E3A5F;
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1E3A5F;
        }

        .logo-text span {
            color: #F97316;
        }

        .new-post-btn {
            background-color: #1E3A5F;
            border: none;
            border-radius: 40px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            width: 100%;
        }

        @media (min-width: 600px) {
            .new-post-btn {
                width: auto;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
            padding: 16px;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: white;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 28px;
            padding: 20px;
            position: relative;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid #F97316;
            padding-left: 12px;
            color: #1E3A5F;
        }

        .close-modal {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #8f9fb0;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #1E3A5F;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            border: 1.5px solid #cbd5e1;
            border-radius: 14px;
            padding: 10px 14px;
            font-size: 0.9rem;
            background: #fff;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #F97316;
            outline: none;
        }

        .inline-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 450px) {
            .inline-row {
                flex-direction: row;
            }
            .inline-row .form-group {
                flex: 1;
            }
        }

        .btn-submit-modal {
            background: #F97316;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 16px;
            cursor: pointer;
        }

        .categorias-wrapper {
            margin-bottom: 24px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 8px;
        }

        .categorias-container {
            display: inline-flex;
            gap: 8px;
        }

        .categoria-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 32px;
            padding: 8px 18px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1E3A5F;
            cursor: pointer;
            white-space: nowrap;
        }

        .categoria-btn.active {
            background: #1E3A5F;
            border-color: #1E3A5F;
            color: white;
        }

        .add-cat-btn {
            background: #f1f5f9;
            border: 1px dashed #F97316;
            border-radius: 32px;
            padding: 8px 16px;
            font-size: 0.75rem;
            color: #F97316;
            cursor: pointer;
            white-space: nowrap;
        }

        .profissionais-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-info {
            padding: 16px;
            background: white;
        }

        .prof-name-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 12px;
        }

        .prof-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1E3A5F;
        }

        .categoria-tag {
            font-size: 0.7rem;
            background: #EFF6FF;
            padding: 4px 12px;
            border-radius: 30px;
            color: #1E3A5F;
            font-weight: 600;
        }

        .rating-stars {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .star {
            color: #cbd5e1;
            font-size: 1rem;
        }

        .star.filled {
            color: #F97316;
        }

        .rating-value {
            font-size: 0.75rem;
            color: #5b6e8c;
            margin-left: 4px;
        }

        .contact-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 0.8rem;
            color: #5b6e8c;
            margin-bottom: 8px;
        }

        .contact-info span {
            background: #f8fafc;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .doc-info {
            font-size: 0.7rem;
            color: #8ba0b5;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid #eef2f8;
        }

        .photos-area {
            padding: 12px 16px;
            background: #fefefe;
            border-top: 1px solid #eef2f8;
            border-bottom: 1px solid #eef2f8;
        }

        .photos-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: #F97316;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .photos-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .photo-badge {
            background: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            color: #1E3A5F;
        }

        .photo-badge:hover {
            background: #F97316;
            color: white;
        }

        .reviews-section {
            border-top: 1px solid #eef2f8;
        }

        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fafcff;
            cursor: pointer;
            user-select: none;
        }

        .reviews-header:hover {
            background: #f5f8fe;
        }

        .reviews-title {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1E3A5F;
        }

        .reviews-toggle {
            font-size: 0.8rem;
            color: #F97316;
            transition: transform 0.2s;
        }

        .reviews-toggle.open {
            transform: rotate(180deg);
        }

        .reviews-content {
            display: none;
            padding: 0 16px 16px 16px;
            background: white;
        }

        .reviews-content.show {
            display: block;
        }

        .review-item {
            background: #F8FAFE;
            border-left: 3px solid #F97316;
            padding: 12px 14px;
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .review-item:last-child {
            margin-bottom: 0;
        }

        .review-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 700;
            color: #1E3A5F;
            margin-bottom: 8px;
            gap: 8px;
        }

        .review-stars {
            display: inline-flex;
            gap: 3px;
        }

        .review-star {
            color: #cbd5e1;
            font-size: 0.75rem;
        }

        .review-star.filled {
            color: #F97316;
        }

        .review-text {
            font-size: 0.85rem;
            color: #2d3e50;
            line-height: 1.4;
        }

        .review-media {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .review-media-link {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            text-decoration: none;
            color: #F97316;
        }

        .btn-add-review {
            background: none;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            margin: 12px 16px 16px 16px;
            cursor: pointer;
            color: #F97316;
            width: calc(100% - 32px);
        }

        @media (min-width: 450px) {
            .btn-add-review {
                width: auto;
                display: inline-block;
                margin-left: 16px;
                margin-right: auto;
            }
        }

        .inline-review-form {
            margin: 0 16px 16px 16px;
            background: #f9fafc;
            border-radius: 18px;
            padding: 14px;
        }

        .review-input-row {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 12px;
        }

        @media (min-width: 450px) {
            .review-input-row {
                flex-direction: row;
            }
            .review-input-row input {
                flex: 1;
            }
        }

        .review-input-row input, .review-form-text {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            font-size: 0.8rem;
        }

        .review-form-text {
            border-radius: 16px;
            margin: 8px 0;
            resize: vertical;
        }

        .star-rating-input {
            display: flex;
            gap: 8px;
            font-size: 1.8rem;
            cursor: pointer;
            margin: 10px 0;
            justify-content: center;
        }

        .star-rating-input .star {
            color: #cbd5e1;
            transition: color 0.2s;
        }

        .star-rating-input .star.filled {
            color: #F97316;
        }

        .media-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 14px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            background-color: #f8fafc;
            font-size: 0.75rem;
            color: #5b6e8c;
            margin: 8px 0;
        }

        .media-upload-area:hover {
            border-color: #F97316;
            background-color: #fff7ed;
        }

        .media-previews {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .media-preview-item {
            position: relative;
            width: 55px;
            height: 55px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .media-preview-item img, .media-preview-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .whatsapp-share {
            display: flex;
            justify-content: center;
            padding: 12px 16px;
            border-top: 1px solid #eef2f8;
            background: #fafcff;
        }

        .btn-whatsapp {
            background: #25D366;
            border: none;
            border-radius: 30px;
            padding: 10px 20px;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            width: 100%;
            justify-content: center;
        }

        .btn-whatsapp:hover {
            background: #1da851;
            transform: scale(0.98);
        }

        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #8ba0b5;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .loading {
            text-align: center;
            padding: 50px 20px;
            color: #F97316;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-minimal">
        <div class="logo">
            <div class="logo-icon">🏠</div>
            <div class="logo-text">My <span>House</span></div>
        </div>
        <button class="new-post-btn" id="openModalBtn">+ Nova indicação</button>
    </div>

    <div class="categorias-wrapper">
        <div class="categorias-container" id="categoriasContainer"></div>
    </div>

    <div id="listaProfissionais" class="profissionais-grid">
        <div class="loading">🔄 Carregando indicações...</div>
    </div>

    <footer>My House • indicações entre vizinhos • dados salvos na nuvem</footer>
</div>

<!-- MODAL NOVA INDICAÇÃO -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-modal" id="closeModalBtn">&times;</span>
        <h3>Nova indicação</h3>
        <div class="form-group">
            <label>Profissional / Empresa</label>
            <input type="text" id="modalNome" placeholder="Ex: Gran Design">
        </div>
        <div class="form-group">
            <label>Categoria</label>
            <select id="modalCategoria"></select>
        </div>
        <div class="form-group">
            <label>Telefone *</label>
            <input type="text" id="modalTelefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
            <label>Documento (CNPJ/CPF - opcional)</label>
            <input type="text" id="modalDocumento" placeholder="00.000.000/0001-00 ou 000.000.000-00">
        </div>
        <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="modalEndereco" placeholder="Rua, número, bairro">
        </div>
        <div class="inline-row">
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" id="modalIndicador" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Seu AP</label>
                <input type="text" id="modalAp" placeholder="Bloco, nº">
            </div>
        </div>
        <div class="form-group">
            <label>Sua nota *</label>
            <div id="modalStarRating" class="star-rating-input" data-rating="5"></div>
        </div>
        <div class="form-group">
            <label>Sua avaliação * (mín. 20 caracteres)</label>
            <textarea rows="3" id="modalAvaliacao" placeholder="Conte sua experiência..."></textarea>
        </div>
        <div class="form-group">
            <label>Fotos e Vídeos (opcional)</label>
            <div id="modalMediaUpload" class="media-upload-area">
                📸 Clique para adicionar fotos ou vídeos
                <input type="file" id="modalFileInput" multiple accept="image/*,video/*" style="display:none">
            </div>
            <div id="modalMediaPreviews" class="media-previews"></div>
        </div>
        <button class="btn-submit-modal" id="submitProfissional">Cadastrar profissional</button>
    </div>
</div>

<script>
    (function() {
        // ============================================
        // CONFIGURAÇÕES DO SUPABASE
        // ============================================
        const SUPABASE_URL = "https://kjbbthydceoqqppxhpwb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_ln29EqiHlLAnoFzQwGFPmQ_UfDK4-Wq";
        const BUCKET_NAME = "my-house-media";
        const SITE_URL = "https://my-house-gray.vercel.app";
        // ============================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let categoriaAtiva = "todos";
        let categoriasSet = new Set(["moveis", "eletricistas", "ar-condicionado", "marmores", "obras", "gesso", "outros"]);
        const categoriaDisplay = {
            moveis: "Móveis",
            eletricistas: "Eletricistas",
            "ar-condicionado": "Ar Condicionado",
            marmores: "Mármores/Granitos",
            obras: "Obras/Reformas",
            gesso: "Gesso",
            outros: "Outros"
        };

        let modalFiles = [];

        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function setupStarRating(containerId, initialRating = 5) {
            const container = document.getElementById(containerId);
            if (!container) return;
            
            container.innerHTML = '';
            for (let i = 1; i <= 5; i++) {
                const star = document.createElement('span');
                star.className = 'star';
                star.textContent = '★';
                star.dataset.value = i;
                star.onclick = () => {
                    const rating = parseInt(star.dataset.value);
                    container.dataset.rating = rating;
                    const stars = container.querySelectorAll('.star');
                    stars.forEach(s => {
                        if (parseInt(s.dataset.value) <= rating) {
                            s.classList.add('filled');
                        } else {
                            s.classList.remove('filled');
                        }
                    });
                };
                container.appendChild(star);
            }
            
            const stars = container.querySelectorAll('.star');
            stars.forEach(s => {
                if (parseInt(s.dataset.value) <= initialRating) {
                    s.classList.add('filled');
                }
            });
            container.dataset.rating = initialRating;
        }

        async function uploadFiles(files, folder) {
            if (!files || files.length === 0) return [];
            
            const urls = [];
            for (const file of files) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${folder}/${Date.now()}-${Math.random().toString(36).substr(2, 6)}.${fileExt}`;
                
                const { error } = await supabase.storage
                    .from(BUCKET_NAME)
                    .upload(fileName, file);
                
                if (error) {
                    console.error("Upload error:", error);
                    continue;
                }
                
                const { data: urlData } = supabase.storage
                    .from(BUCKET_NAME)
                    .getPublicUrl(fileName);
                
                if (urlData) urls.push(urlData.publicUrl);
            }
            return urls;
        }

        async function carregarProfissionais() {
            try {
                const { data: profs, error } = await supabase
                    .from('profissionais')
                    .select('*')
                    .order('created_at', { ascending: false });
                    
                if (error) throw error;
                
                for (let p of profs || []) {
                    const { data: avals } = await supabase
                        .from('avaliacoes')
                        .select('*')
                        .eq('profissional_id', p.id)
                        .order('created_at', { ascending: false });
                    p.avaliacoes = avals || [];
                    if (p.categoria) categoriasSet.add(p.categoria);
                }
                return profs || [];
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        function calcularMedia(prof) {
            let soma = prof.nota_principal || 5;
            let count = 1;
            
            if (prof.avaliacoes && prof.avaliacoes.length) {
                prof.avaliacoes.forEach(av => {
                    if (av.nota) {
                        soma += av.nota;
                        count++;
                    }
                });
            }
            return (soma / count).toFixed(1);
        }

        function renderStars(rating) {
            const filled = Math.floor(rating);
            return Array(5).fill().map((_, i) => 
                `<span class="star ${i < filled ? 'filled' : ''}">★</span>`
            ).join('');
        }

        function renderSmallStars(rating) {
            const filled = Math.floor(rating);
            return Array(5).fill().map((_, i) => 
                `<span class="review-star ${i < filled ? 'filled' : ''}">★</span>`
            ).join('');
        }

        function renderizarCategorias() {
            const container = document.getElementById('categoriasContainer');
            if (!container) return;
            container.innerHTML = `<button class="categoria-btn active" data-cat="todos">📋 Todos</button>`;
            
            const sorted = Array.from(categoriasSet).sort();
            for (let cat of sorted) {
                const btn = document.createElement('button');
                btn.className = 'categoria-btn';
                btn.setAttribute('data-cat', cat);
                btn.innerText = categoriaDisplay[cat] || cat;
                btn.onclick = () => {
                    document.querySelectorAll('.categoria-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    categoriaAtiva = cat;
                    renderizarCards();
                };
                container.appendChild(btn);
            }
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-cat-btn';
            addBtn.innerText = '+ Nova categoria';
            addBtn.onclick = () => {
                let nova = prompt("Digite o nome da nova categoria");
                if (nova && nova.trim()) {
                    let key = nova.trim().toLowerCase().replace(/\s/g, '');
                    categoriasSet.add(key);
                    categoriaDisplay[key] = nova.trim();
                    renderizarCategorias();
                    atualizarSelectCategorias();
                }
            };
            container.appendChild(addBtn);
        }

        function atualizarSelectCategorias() {
            const select = document.getElementById('modalCategoria');
            if (!select) return;
            select.innerHTML = '';
            for (let cat of categoriasSet) {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = categoriaDisplay[cat] || cat;
                select.appendChild(opt);
            }
        }

        async function renderizarCards() {
            const container = document.getElementById('listaProfissionais');
            container.innerHTML = '<div class="loading">🔄 Carregando...</div>';
            
            const profissionais = await carregarProfissionais();
            let filtrados = categoriaAtiva === 'todos' ? profissionais : profissionais.filter(p => p.categoria === categoriaAtiva);
            
            if (filtrados.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px;">🏠 Nenhum profissional encontrado</div>`;
                return;
            }
            
            container.innerHTML = '';
            for (let prof of filtrados) {
                const media = calcularMedia(prof);
                const totalAvaliacoes = 1 + (prof.avaliacoes?.length || 0);
                
                let avaliacoesHtml = '';
                if (prof.avaliacoes && prof.avaliacoes.length > 0) {
                    prof.avaliacoes.forEach(av => {
                        avaliacoesHtml += `
                            <div class="review-item">
                                <div class="review-header">
                                    <span>👤 ${escapeHtml(av.nome)} (AP ${escapeHtml(av.ap)})</span>
                                    <div class="review-stars">${renderSmallStars(av.nota || 5)}</div>
                                </div>
                                <div class="review-text">${escapeHtml(av.comentario)}</div>
                                ${av.fotos && av.fotos.length ? `<div class="review-media">${av.fotos.map(f => `<a href="${f}" target="_blank" class="review-media-link">📷 Foto</a>`).join('')}</div>` : ''}
                            </div>
                        `;
                    });
                } else {
                    avaliacoesHtml = `<div style="text-align:center; padding:20px; color:#8ba0b5;">Ainda não há avaliações. Seja o primeiro a avaliar!</div>`;
                }
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-info">
                        <div class="prof-name-row">
                            <span class="prof-name">${escapeHtml(prof.nome)}</span>
                            <span class="categoria-tag">${categoriaDisplay[prof.categoria] || prof.categoria}</span>
                        </div>
                        <div class="rating-stars">
                            ${renderStars(media)}
                            <span class="rating-value">(${media} - ${totalAvaliacoes} ${totalAvaliacoes === 1 ? 'avaliação' : 'avaliações'})</span>
                        </div>
                        <div class="contact-info">
                            <span>📞 ${escapeHtml(prof.telefone)}</span>
                            ${prof.endereco ? `<span>📍 ${escapeHtml(prof.endereco)}</span>` : ''}
                        </div>
                        ${prof.documento ? `<div class="doc-info">📄 ${escapeHtml(prof.documento)}</div>` : ''}
                    </div>
                    
                    ${prof.fotos_servico && prof.fotos_servico.length ? `
                        <div class="photos-area">
                            <div class="photos-label">📸 Fotos do serviço executado</div>
                            <div class="photos-list">${prof.fotos_servico.map(f => `<a href="${f}" target="_blank" class="photo-badge">📷 Foto</a>`).join('')}</div>
                        </div>
                    ` : ''}
                    
                    <div class="reviews-section">
                        <div class="reviews-header" data-id="${prof.id}">
                            <span class="reviews-title">⭐ Avaliação de ${escapeHtml(prof.indicado_por)} (AP ${escapeHtml(prof.ap_indicador)})</span>
                            <span class="reviews-toggle">▼</span>
                        </div>
                        <div class="reviews-content" id="reviews-content-${prof.id}">
                            <div class="review-item">
                                <div class="review-header">
                                    <span><strong>${escapeHtml(prof.indicado_por)}</strong> (AP ${escapeHtml(prof.ap_indicador)})</span>
                                    <div class="review-stars">${renderSmallStars(prof.nota_principal || 5)}</div>
                                </div>
                                <div class="review-text">${escapeHtml(prof.avaliacao_principal)}</div>
                            </div>
                            <div style="margin-top: 12px; font-weight: 500; font-size: 0.7rem; color:#1E3A5F;">🗣️ Outras avaliações dos vizinhos</div>
                            ${avaliacoesHtml}
                        </div>
                    </div>
                    
                    <button class="btn-add-review" data-id="${prof.id}">⭐ Avaliar este profissional</button>
                    <div id="rev-${prof.id}" class="inline-review-form">
                        <div style="text-align:center; margin-bottom:8px;">
                            <div class="star-rating-input" id="starRev_${prof.id}" data-rating="5"></div>
                        </div>
                        <div class="review-input-row">
                            <input type="text" id="nomeRev_${prof.id}" placeholder="Seu nome *">
                            <input type="text" id="apRev_${prof.id}" placeholder="Seu AP *">
                        </div>
                        <textarea id="comentRev_${prof.id}" class="review-form-text" rows="3" placeholder="Sua avaliação * (mín. 20 caracteres)"></textarea>
                        <div class="media-upload-area" id="uploadAreaRev_${prof.id}">
                            📸 Adicionar foto/vídeo
                            <input type="file" id="fileRev_${prof.id}" accept="image/*,video/*" style="display:none" multiple>
                        </div>
                        <div id="previewRev_${prof.id}" class="media-previews"></div>
                        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:12px;">
                            <button class="btn-cancel-review" data-id="${prof.id}">Cancelar</button>
                            <button class="btn-submit-review" data-id="${prof.id}" style="background:#F97316; color:white; border:none; padding:8px 20px; border-radius:30px;">Enviar Avaliação</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
                
                setupStarRating(`starRev_${prof.id}`, 5);
                
                const reviewsHeader = card.querySelector(`.reviews-header[data-id="${prof.id}"]`);
                const reviewsContent = document.getElementById(`reviews-content-${prof.id}`);
                const toggleIcon = reviewsHeader.querySelector('.reviews-toggle');
                
                reviewsHeader.onclick = () => {
                    reviewsContent.classList.toggle('show');
                    toggleIcon.classList.toggle('open');
                };
                
                const uploadArea = document.getElementById(`uploadAreaRev_${prof.id}`);
                const fileInput = document.getElementById(`fileRev_${prof.id}`);
                const previewContainer = document.getElementById(`previewRev_${prof.id}`);
                let reviewFiles = [];
                
                if (uploadArea && fileInput) {
                    uploadArea.onclick = () => fileInput.click();
                    fileInput.onchange = () => {
                        previewContainer.innerHTML = '';
                        reviewFiles = Array.from(fileInput.files);
                        reviewFiles.forEach(file => {
                            const url = URL.createObjectURL(file);
                            const isVideo = file.type.startsWith('video/');
                            const preview = document.createElement('div');
                            preview.className = 'media-preview-item';
                            if (isVideo) {
                                const video = document.createElement('video');
                                video.src = url;
                                video.muted = true;
                                preview.appendChild(video);
                            } else {
                                const img = document.createElement('img');
                                img.src = url;
                                preview.appendChild(img);
                            }
                            previewContainer.appendChild(preview);
                        });
                    };
                }
                
                const submitBtn = card.querySelector(`.btn-submit-review[data-id="${prof.id}"]`);
                if (submitBtn) {
                    submitBtn.onclick = async () => {
                        submitBtn.disabled = true;
                        submitBtn.innerText = 'Enviando...';
                        
                        const rating = parseInt(document.getElementById(`starRev_${prof.id}`)?.dataset.rating || '5');
                        const nome = document.getElementById(`nomeRev_${prof.id}`)?.value.trim();
                        const ap = document.getElementById(`apRev_${prof.id}`)?.value.trim();
                        const coment = document.getElementById(`comentRev_${prof.id}`)?.value.trim();
                        
                        if (!nome || !ap || !coment) {
                            alert("Preencha nome, AP e avaliação");
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'Enviar Avaliação';
                            return;
                        }
                        
                        if (coment.length < 20) {
                            alert("Avaliação deve ter no mínimo 20 caracteres");
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'Enviar Avaliação';
                            return;
                        }
                        
                        let fotosUrls = [];
                        const fileInputElem = document.getElementById(`fileRev_${prof.id}`);
                        if (fileInputElem && fileInputElem.files.length > 0) {
                            fotosUrls = await uploadFiles(Array.from(fileInputElem.files), `avaliacoes/${prof.id}`);
                        }
                        
                        const { error } = await supabase.from('avaliacoes').insert({
                            id: generateId(),
                            profissional_id: prof.id,
                            nome, ap,
                            comentario: coment,
                            nota: rating,
                            fotos: fotosUrls
                        });
                        
                        if (error) {
                            alert("Erro: " + error.message);
                            submitBtn.disabled = false;
                            submitBtn.innerText = 'Enviar Avaliação';
                        } else {
                            alert("✅ Avaliação enviada com sucesso!");
                            
                            // Substituir o formulário pelo botão WhatsApp
                            const formDiv = document.getElementById(`rev-${prof.id}`);
                            const whatsappMessage = gerarTextoWhatsAppCompartilhamento(prof, nome, ap, coment, rating);
                            const numeroTelefone = prof.telefone.replace(/\D/g, '');
                            
                            formDiv.innerHTML = `
                                <div style="text-align:center; padding:20px;">
                                    <div style="font-size:1.2rem; margin-bottom:10px;">✅ Avaliação enviada!</div>
                                    <div style="margin-bottom:20px; color:#1E3A5F;">Obrigado por compartilhar sua experiência!</div>
                                    <button class="btn-whatsapp" id="whatsapp-btn-${prof.id}" style="background:#25D366; border:none; border-radius:30px; padding:12px 20px; color:white; font-weight:600; cursor:pointer; width:100%;">
                                        💬 Compartilhar no WhatsApp
                                    </button>
                                </div>
                            `;
                            
                            const whatsappBtn = document.getElementById(`whatsapp-btn-${prof.id}`);
                            if (whatsappBtn) {
                                whatsappBtn.onclick = () => {
                                    const textoCodificado = encodeURIComponent(whatsappMessage);
                                    window.open(`https://wa.me/55${numeroTelefone}?text=${textoCodificado}`, '_blank');
                                };
                            }
                            
                            submitBtn.disabled = false;
                            // Não recarregar a página, apenas manter o card
                        }
                    };
                }
                
                const cancelBtn = card.querySelector(`.btn-cancel-review[data-id="${prof.id}"]`);
                if (cancelBtn) {
                    cancelBtn.onclick = () => {
                        const formDiv = document.getElementById(`rev-${prof.id}`);
                        formDiv.style.display = 'none';
                    };
                }
            }
            
            document.querySelectorAll('.btn-add-review').forEach(btn => {
                btn.onclick = () => {
                    const id = btn.getAttribute('data-id');
                    document.querySelectorAll('.inline-review-form').forEach(f => f.style.display = 'none');
                    const form = document.getElementById(`rev-${id}`);
                    if (form) form.style.display = 'block';
                };
            });
        }
        
        function gerarTextoWhatsAppCompartilhamento(prof, nome, ap, comentario, nota) {
            const texto = `Olá vizinhos! 🏠

*INDICAÇÃO DE PROFISSIONAL - MY HOUSE*

📌 *Profissional:* ${prof.nome}
📞 *Contato:* ${prof.telefone}
⭐ *Minha nota:* ${nota} estrelas

*MINHA EXPERIÊNCIA:*
"${comentario}"

*Compartilhado por:* ${nome} (AP ${ap})

🔗 *Veja mais em:* ${SITE_URL}

---
Enviado via My House - Indicações entre vizinhos 🏡`;
            
            return texto;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function configurarModal() {
            setupStarRating('modalStarRating', 5);
            
            const uploadArea = document.getElementById('modalMediaUpload');
            const fileInput = document.getElementById('modalFileInput');
            const previewsContainer = document.getElementById('modalMediaPreviews');
            
            if (uploadArea && fileInput) {
                uploadArea.onclick = () => fileInput.click();
                fileInput.onchange = () => {
                    previewsContainer.innerHTML = '';
                    modalFiles = Array.from(fileInput.files);
                    modalFiles.forEach(file => {
                        const url = URL.createObjectURL(file);
                        const isVideo = file.type.startsWith('video/');
                        const preview = document.createElement('div');
                        preview.className = 'media-preview-item';
                        if (isVideo) {
                            const video = document.createElement('video');
                            video.src = url;
                            video.muted = true;
                            preview.appendChild(video);
                        } else {
                            const img = document.createElement('img');
                            img.src = url;
                            preview.appendChild(img);
                        }
                        previewsContainer.appendChild(preview);
                    });
                };
            }
            
            const openBtn = document.getElementById('openModalBtn');
            const modal = document.getElementById('modalOverlay');
            const closeBtn = document.getElementById('closeModalBtn');
            
            openBtn.onclick = () => modal.classList.add('active');
            closeBtn.onclick = () => modal.classList.remove('active');
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
            
            const submitBtn = document.getElementById('submitProfissional');
            submitBtn.onclick = async () => {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Cadastrando...';
                
                const nome = document.getElementById('modalNome').value.trim();
                const categoria = document.getElementById('modalCategoria').value;
                const telefone = document.getElementById('modalTelefone').value.trim();
                const documento = document.getElementById('modalDocumento').value.trim();
                const endereco = document.getElementById('modalEndereco').value.trim();
                const indicador = document.getElementById('modalIndicador').value.trim();
                const ap = document.getElementById('modalAp').value.trim();
                const avaliacao = document.getElementById('modalAvaliacao').value.trim();
                const nota = parseInt(document.getElementById('modalStarRating').dataset.rating || '5');
                
                if (!nome || !telefone || !indicador || !ap || !avaliacao) {
                    alert("Preencha todos os campos obrigatórios");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Cadastrar profissional';
                    return;
                }
                
                if (avaliacao.length < 20) {
                    alert("Avaliação deve ter no mínimo 20 caracteres");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Cadastrar profissional';
                    return;
                }
                
                const profissionalId = generateId();
                let fotosUrls = [];
                if (modalFiles.length > 0) {
                    fotosUrls = await uploadFiles(modalFiles, `profissionais/${profissionalId}`);
                }
                
                const { error } = await supabase.from('profissionais').insert({
                    id: profissionalId,
                    nome, categoria, telefone, documento, endereco,
                    indicado_por: indicador,
                    ap_indicador: ap,
                    avaliacao_principal: avaliacao,
                    nota_principal: nota,
                    fotos_servico: fotosUrls
                });
                
                if (error) {
                    alert("Erro ao cadastrar: " + error.message);
                } else {
                    alert("✅ Profissional cadastrado com sucesso!");
                    modal.classList.remove('active');
                    document.getElementById('modalNome').value = '';
                    document.getElementById('modalTelefone').value = '';
                    document.getElementById('modalDocumento').value = '';
                    document.getElementById('modalEndereco').value = '';
                    document.getElementById('modalIndicador').value = '';
                    document.getElementById('modalAp').value = '';
                    document.getElementById('modalAvaliacao').value = '';
                    modalFiles = [];
                    document.getElementById('modalMediaPreviews').innerHTML = '';
                    renderizarCards();
                }
                submitBtn.disabled = false;
                submitBtn.innerText = 'Cadastrar profissional';
            };
        }

        renderizarCategorias();
        atualizarSelectCategorias();
        renderizarCards();
        configurarModal();
    })();
</script>
</body>
</html>
